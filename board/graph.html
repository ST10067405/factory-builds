<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Graph — Arkatype</title>
<style>
:root{--bg:#0d0f13;--ink:#e7eaf0;--mut:#8b93a4;--line:#262d3a;--accent:#4ecab0;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,Segoe UI,sans-serif;overflow:hidden}
header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:16px;padding:12px 20px;background:rgba(13,15,19,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.brand{font-weight:700}.brand span{color:var(--accent)}
a.back{color:var(--mut);text-decoration:none;font-size:13px;border:1px solid var(--line);padding:7px 13px;border-radius:8px}
a.back:hover{color:var(--ink);border-color:var(--accent)}
.search{background:#1c212c;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 12px;width:220px;outline:none}
.search:focus{border-color:var(--accent)}
.legend{display:flex;gap:14px;font-size:11px;color:var(--mut);flex-wrap:wrap;margin-left:auto}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
canvas{display:block;cursor:grab}
.hint{position:fixed;bottom:14px;left:20px;font-size:11px;color:var(--mut)}
#tip{position:fixed;z-index:20;background:#1c212c;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:12px;pointer-events:none;display:none;max-width:260px}
</style>
</head>
<body>
<header>
  <div class="brand">Arkatype <span>Graph</span></div>
  <a class="back" href="index.html">← Board</a>
  <input class="search" id="search" placeholder="Highlight…">
  <div class="legend" id="legend"></div>
</header>
<canvas id="c"></canvas>
<div class="hint">Drag nodes · click to open · scroll to zoom</div>
<div id="tip"></div>
<script>
const STATUS_COLOR={built:'#6b7688',gate_passed:'#3ecf8e',deployed:'#6ea8fe',outreach_sent:'#f0a350',replied:'#c77dff',won:'#4ecab0',cold:'#556'};
const TYPE_COLOR={doc:'#c77dff',sop:'#c77dff',db:'#4ecab0',template:'#3a4152'};
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W,H,DPR; function resize(){DPR=devicePixelRatio||1;W=innerWidth||document.documentElement.clientWidth||1280;H=innerHeight||document.documentElement.clientHeight||800;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);} resize(); addEventListener('resize',resize);

let nodes=[], edges=[], view={x:0,y:0,z:1}, hi='';

function color(n){ if(n.type==='project') return STATUS_COLOR[n.status]||'#889'; return TYPE_COLOR[n.type]||'#889'; }

fetch('/api/state').then(r=>r.json()).then(state=>{
  const cx=W/2, cy=H/2;
  const nById={};
  // document / db / sop nodes (hubs) near centre
  state.documents.forEach((d,i)=>{
    const a=(i/state.documents.length)*Math.PI*2;
    const n={id:d.id,label:d.label,type:d.type,r:d.type==='db'?16:12,available:d.available,
      x:cx+Math.cos(a)*120,y:cy+Math.sin(a)*120,vx:0,vy:0,
      open:()=>{ if(!d.available){toast('Not found on this machine — edit board/board.config.json');return;} d.url?window.open(d.url,'_blank'):openPath(d.path); }};
    nodes.push(n);nById[d.id]=n;
  });
  // template node
  const tpl={id:'_template',label:'_template',type:'template',r:11,x:cx,y:cy-160,vx:0,vy:0,open:()=>openPath(state.root+'/_template')};
  nodes.push(tpl);nById._template=tpl;
  // project nodes ring
  state.projects.forEach((p,i)=>{
    const a=(i/state.projects.length)*Math.PI*2;
    const n={id:p.slug,label:p.title,type:'project',status:p.status,active:p.active,priority:p.priority,
      r:p.active?12:8,x:cx+Math.cos(a)*(320+Math.random()*40),y:cy+Math.sin(a)*(320+Math.random()*40),vx:0,vy:0,
      sub:p.status+(p.active?' · standard':' · legacy')+' · '+(p.realCount?p.realCount+' real photos':'stock'),
      open:()=>window.open('/'+p.slug+'/','_blank')};
    nodes.push(n);nById[p.slug]=n;
    // edges: every project -> Leads DB
    if(nById['db-leads']) edges.push([n.id,'db-leads']);
    // active projects -> process + clients SOP + template
    if(p.active){ ['sop-process','sop-clients','_template'].forEach(t=>nById[t]&&edges.push([n.id,t])); }
    // explicit linked docs
    (p.docs||[]).forEach(dl=>{ const m=state.documents.find(d=>d.label===dl.label||d.id===dl.id); if(m)edges.push([n.id,m.id]); });
  });
  // doc cluster: link SOPs to pricing/agreement
  ['sop-clients','doc-agreement','doc-international'].forEach(t=>nById[t]&&nById['doc-pricing']&&edges.push([t,'doc-pricing']));
  nById['sop-process']&&nById['sop-clients']&&edges.push(['sop-process','sop-clients']);
  // legend
  document.getElementById('legend').innerHTML =
    Object.entries({gate_passed:'Gate passed',built:'Built',outreach_sent:'Outreach',deployed:'Deployed'}).map(([k,v])=>'<span><i style="background:'+STATUS_COLOR[k]+'"></i>'+v+'</span>').join('')
    +'<span><i style="background:'+TYPE_COLOR.db+'"></i>Notion DB</span><span><i style="background:'+TYPE_COLOR.doc+'"></i>Docs/SOPs</span>';
  requestAnimationFrame(loop);
});
function openPath(p){fetch('/api/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:p})});}
function toast(m){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4ecab0;color:#062018;font-weight:600;font-size:13px;padding:10px 20px;border-radius:99px;opacity:0;transition:.25s;z-index:50;pointer-events:none'; document.body.appendChild(t); } t.textContent=m; t.style.opacity='1'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity='0',1400); }

// physics
function step(){
  const cx=W/2,cy=H/2;
  for(let i=0;i<nodes.length;i++){const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){const b=nodes[j];
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2);
      const f=2600/d2; const ux=dx/d,uy=dy/d;
      a.vx+=ux*f;a.vy+=uy*f;b.vx-=ux*f;b.vy-=uy*f;
    }
    // gravity to centre
    a.vx+=(cx-a.x)*0.0009; a.vy+=(cy-a.y)*0.0009;
  }
  edges.forEach(([ai,bi])=>{const a=byId(ai),b=byId(bi);if(!a||!b)return;
    let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,rest=110,f=(d-rest)*0.008,ux=dx/d,uy=dy/d;
    a.vx+=ux*f;a.vy+=uy*f;b.vx-=ux*f;b.vy-=uy*f;});
  nodes.forEach(n=>{if(n===drag)return;n.vx*=0.86;n.vy*=0.86;n.x+=n.vx;n.y+=n.vy;});
}
const _byId={}; function byId(id){ if(!_byId[id]) _byId[id]=nodes.find(n=>n.id===id); return _byId[id]; }

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(view.x,view.y);ctx.scale(view.z,view.z);
  // edges
  ctx.lineWidth=1;
  edges.forEach(([ai,bi])=>{const a=byId(ai),b=byId(bi);if(!a||!b)return;
    const lit=hi&&(a.label.toLowerCase().includes(hi)||b.label.toLowerCase().includes(hi));
    ctx.strokeStyle=lit?'rgba(78,202,176,.5)':'rgba(120,130,150,.13)';
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
  // nodes
  nodes.forEach(n=>{
    const lit=(!hi||n.label.toLowerCase().includes(hi)) && n.available!==false;
    ctx.globalAlpha=lit?1:.25;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fillStyle=color(n);ctx.fill();
    if(n.type==='project'&&n.active){ctx.lineWidth=2;ctx.strokeStyle='#e7eaf0';ctx.stroke();}
    ctx.globalAlpha=lit?.92:.3;ctx.fillStyle='#cbd2df';ctx.font=(n.type!=='project'||n.active?'600 ':'')+'11px Inter,sans-serif';
    ctx.fillText(n.label,n.x+n.r+4,n.y+3);
    ctx.globalAlpha=1;
  });
  ctx.restore();
}
function loop(){step();draw();}
// setInterval driver (not rAF): renders even in throttled/hidden/embedded contexts
setInterval(loop, 1000/30);
window.__g={draw:()=>{step();draw();},n:()=>nodes.length,e:()=>edges.length};

// interaction
let drag=null,down=null,moved=false;
function toWorld(e){return{x:(e.clientX-view.x)/view.z,y:(e.clientY-view.y)/view.z};}
function pick(e){const w=toWorld(e);return nodes.find(n=>Math.hypot(n.x-w.x,n.y-w.y)<=n.r+4);}
canvas.addEventListener('mousedown',e=>{const n=pick(e);down={x:e.clientX,y:e.clientY};moved=false;if(n){drag=n;canvas.style.cursor='grabbing';}else{drag='__pan__';}});
addEventListener('mousemove',e=>{
  const tip=document.getElementById('tip');
  if(drag==='__pan__'&&down){view.x+=e.clientX-down.x;view.y+=e.clientY-down.y;down={x:e.clientX,y:e.clientY};moved=true;return;}
  if(drag&&drag!=='__pan__'){const w=toWorld(e);drag.x=w.x;drag.y=w.y;drag.vx=drag.vy=0;moved=true;return;}
  const n=pick(e);
  if(n){tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';
    tip.innerHTML='<b>'+n.label+'</b>'+(n.sub?'<br><span style="color:#8b93a4">'+n.sub+'</span>':'')+'<br><span style="color:#4ecab0">click to open</span>';canvas.style.cursor='pointer';}
  else{tip.style.display='none';canvas.style.cursor='grab';}
});
addEventListener('mouseup',e=>{
  if(drag&&drag!=='__pan__'&&!moved){drag.open&&drag.open();}
  drag=null;down=null;canvas.style.cursor='grab';
});
canvas.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;const mx=e.clientX,my=e.clientY;view.x=mx-(mx-view.x)*f;view.y=my-(my-view.y)*f;view.z*=f;},{passive:false});
document.getElementById('search').oninput=e=>hi=e.target.value.trim().toLowerCase();
</script>
</body>
</html>
